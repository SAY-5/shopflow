spring:
  application:
    name: orders-service
  datasource:
    url: ${ORDERS_DB_URL:jdbc:postgresql://localhost:5432/orders}
    username: ${ORDERS_DB_USER:orders}
    password: ${ORDERS_DB_PASSWORD:orders}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${ORDERS_PORT:8083}

shopflow:
  catalog:
    base-url: ${CATALOG_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
