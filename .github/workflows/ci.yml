name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Spotless and checkstyle
        run: mvn -B -ntp spotless:check checkstyle:check

  services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog-service, cart-service, orders-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test ${{ matrix.service }}
        run: mvn -B -ntp -pl ${{ matrix.service }} -am verify
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco
          if-no-files-found: ignore

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [services, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Package service jars
        run: mvn -B -ntp -DskipTests package
      - name: Start the stack
        run: docker compose up -d --build
      - name: Wait for the gateway to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8080/actuator/health | grep -q UP; then
              echo "gateway is up"
              exit 0
            fi
            sleep 5
          done
          echo "gateway did not become healthy"
          docker compose logs
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run end-to-end tests
        working-directory: e2e
        run: npm test
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v

  bench-regress:
    runs-on: ubuntu-latest
    needs: [services]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Measure baseline run
        run: bash bench/run-bench.sh "$GITHUB_WORKSPACE/bench/baseline.json"
      - name: Measure candidate run
        run: bash bench/run-bench.sh "$GITHUB_WORKSPACE/bench/candidate.json"
      - name: Compare and gate on drift
        run: python3 bench/compare.py bench/baseline.json bench/candidate.json
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench/*.json
          if-no-files-found: ignore

  build-images:
    runs-on: ubuntu-latest
    needs: [services, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Package service jars
        run: mvn -B -ntp -DskipTests package
      - name: Build all images
        run: docker compose build
