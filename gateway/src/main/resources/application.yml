server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: catalog
          uri: ${CATALOG_URI:http://localhost:8081}
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=2
        - id: cart
          uri: ${CART_URI:http://localhost:8082}
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=2
        - id: orders
          uri: ${ORDERS_URI:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
